            openModal("Criar Modelo de Placa", html);
        }

        async function saveNovaPlaca() {
            const nome = document.getElementById('np-nome').value.trim().toUpperCase();
            const desc = document.getElementById('np-desc').value.trim();
            const boas = parseInt(document.getElementById('np-boas').value) || 0;
            const ruins = parseInt(document.getElementById('np-ruins').value) || 0;
            const lab = parseInt(document.getElementById('np-lab').value) || 0;
            if(!nome) return showToast("Digite o nome do modelo (Ex: MC9)!", "error");
            const exists = Object.values(placasDB).find(p => p.nome === nome);
            if(exists) return showToast("Este modelo já existe na lista!", "error");
            const opName = localStorage.getItem('sala_valvulas_nome') || "Sistema";
            const shift = localStorage.getItem('sala_valvulas_turno') || "-";
            let hist =[];
            if(boas > 0 || ruins > 0 || lab > 0) {
                hist.push({ id: Date.now().toString(), timestamp: new Date().toISOString(), executante: opName, turno: shift, de: 'externo', para: 'Estoque Inicial', qtd: (boas + ruins + lab), obs: `Estoque Inicial inserido na criação do modelo (${boas} Boas, ${ruins} Ruins, ${lab} Lab).` });
            }
            const newPlaca = { nome: nome, descricao: desc, boas: boas, ruins: ruins, lab: lab, historico: hist };
            await db.collection('placas').add(newPlaca); showToast("Modelo Criado com Sucesso!", "success"); closeModal();
        }

        function openPlacaDetail(id) { state.selectedPlacaId = id; navigateTo('placa_detail'); }

        async function submitPlacaMove() {
            const pId = state.selectedPlacaId; const p = placasDB[pId];
            const op = document.getElementById('placa-op').value.trim(); const turno = state.form.shift;
            const de = document.getElementById('placa-de').value; const para = document.getElementById('placa-para').value;
            const qtd = parseInt(document.getElementById('placa-qtd').value); const obs = document.getElementById('placa-obs').value.trim();
            if(!op || !turno) return showToast("Preencha Nome e Turno!", "error");
            if(isNaN(qtd) || qtd <= 0) return showToast("Quantidade inválida!", "error");
            if(de === para) return showToast("A origem e o destino são os mesmos!", "error");
            localStorage.setItem('sala_valvulas_nome', op); localStorage.setItem('sala_valvulas_turno', turno);
            let updateObj = {};
            if (de !== 'externo') { if(p[de] < qtd) return showToast(`Não há ${qtd} placa(s) em '${de}' para retirar!`, "error"); updateObj[de] = firebase.firestore.FieldValue.increment(-qtd); }
            if (para !== 'externo') { updateObj[para] = firebase.firestore.FieldValue.increment(qtd); }
            const log = { id: Date.now().toString(), timestamp: new Date().toISOString(), executante: op, turno: turno, de: de, para: para, qtd: qtd, obs: obs };
            updateObj.historico = firebase.firestore.FieldValue.arrayUnion(log);
            await db.collection('placas').doc(pId).update(updateObj); showToast("Movimentação Registrada!", "success");
            document.getElementById('placa-qtd').value = "1"; document.getElementById('placa-obs').value = "";
        }

        function askDelPlaca(id) { showPasswordPrompt(async () => { await db.collection('placas').doc(id).delete(); showToast("Placa Excluída do Sistema!", "success"); state.selectedPlacaId = null; navigateTo('placas_list'); }); }

        function initRealtimeListeners() {
            Object.keys(LINE_CONFIGS).forEach(line => {
                if(line==='Placas') return;
                db.collection('lines').doc(line).collection('valves').onSnapshot(snap => {
                    if (!globalDB[line]) globalDB[line] = {};
                    snap.docs.forEach(doc => { const d = doc.data(); d.docId = doc.id; globalDB[line][doc.id] = d; });
                    if(state.mode === 'register' && state.step === 'line') render(false);
                });
            });
            db.collection('oportunidades').onSnapshot(snap => { opportunitiesDB = {}; snap.forEach(doc => { const d = doc.data(); if(!opportunitiesDB[d.linha]) opportunitiesDB[d.linha] =[]; opportunitiesDB[d.linha].push({ id: doc.id, ...d }); }); if(state.mode === 'register' && state.step === 'line') render(false); });
            db.collection('placas').onSnapshot(snap => { placasDB = {}; snap.forEach(doc => { placasDB[doc.id] = { id: doc.id, ...doc.data() }; }); if (state.step === 'line' || state.step === 'placas_list' || state.step === 'placa_detail') render(false); });
        }
        initRealtimeListeners();

        async function submitFalhaGeral() {
            if (!state.form.name.trim()) { showToast("Preencha seu Nome!", "error"); return; }
            if (!state.form.shift) { showToast("Selecione o Turno!", "error"); return; }
            if (!state.form.falhaType) { showToast("Selecione o Tipo de Falha!", "error"); return; }
            localStorage.setItem('sala_valvulas_nome', state.form.name); localStorage.setItem('sala_valvulas_turno', state.form.shift);
            const rec = { id: Date.now().toString(), timestamp: new Date().toISOString(), subset: 'GERAL', type: 'falha_geral', description: `[FALHA] ${state.form.falhaType} ${state.form.description ? '- ' + state.form.description : ''} (Exec: ${state.form.name}/${state.form.shift})`, executante: state.form.name, turno: state.form.shift, status: 'ok', isCritical: false };
            await db.collection('lines').doc(state.selectedLine).collection('valves').doc('GERAL').set({ valveNumber: 0, historico: firebase.firestore.FieldValue.arrayUnion(rec) }, { merge: true });
            showToast("Falha Registrada!", "success"); state.form.description=''; state.form.falhaType=''; state.step = 'line'; render(false);

        function submitForm() {
            if (!state.form.name.trim()) { showToast("Preencha seu Nome!", "error"); return; }

            const hist = globalDB[state.selectedLine]?.[state.selectedValve]?.historico || [];

            // Verifica histórico por componente EXATO — sem cooldown de 24h
            const histBySubset = [];
            state.selectedSubsets.forEach(subset => {
                const recs = hist.filter(r => {
                    const diff = Date.now() - new Date(r.timestamp).getTime();
                    return diff < timeWindow && r.subset === subset && r.type !== 'inspecao';
                }).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                if (recs.length > 0) histBySubset.push({ subset, recs });
            });

            if (histBySubset.length > 0) {
                const subsetsHtml = histBySubset.map(({ subset, recs }) => {
                    const recsHtml = recs.slice(0, 3).map(r => {
                        const d = new Date(r.timestamp);
                        const typeLabel = { preventiva: '✅ Preventiva', corretiva: '🔧 Corretiva' }[r.type] || r.type;

                    <div class="grid grid-cols-2 gap-3">

                        <button onclick="doSubmit(true); closeModal();" class="btn-industrial bg-primary text-black py-3">SALVAR MESMO ASSIM</button>

        async function doSubmit(crit) {
            const timestampStr = new Date().toISOString();
            const recs = state.selectedSubsets.map((sub, idx) => ({ id: Date.now().toString() + '-' + idx, timestamp: timestampStr, subset: sub, type: state.form.type, description: state.form.description, executante: state.form.name, turno: state.form.shift, status: 'ok', isCritical: crit, photos: state.form.photos||[] }));
            await db.collection('lines').doc(state.selectedLine).collection('valves').doc(String(state.selectedValve)).set({ valveNumber: parseInt(state.selectedValve), historico: firebase.firestore.FieldValue.arrayUnion(...recs) }, { merge: true });
            showToast("Manutenções Salvas!", "success"); state.form.description=''; state.form.photos=[]; state.selectedSubsets=[]; state.step='line'; render(false);
        }

        async function submitSonda() { const obs = state.sondaForm.obs, op = state.sondaForm.op, t = state.form.shift; if(!obs || !op || !t) { showToast("Preencha todos os campos!", "error"); return; } const typeRec = state.sondaAction === 'jumper' ? 'sonda_event' : 'corretiva'; const status = state.sondaAction === 'jumper' ? 'jumpeada' : 'ok'; const rec = { id: Date.now().toString(), timestamp: new Date().toISOString(), subset: 'SONDA', type: typeRec, description: `[SONDA] ${state.sondaAction.toUpperCase()}: ${obs} (Op: ${op}/${t})`, status: status==='jumpeada'?'pendente':'ok', isSonda: true }; await db.collection('lines').doc(state.selectedLine).collection('valves').doc(String(state.selectedValve)).set({ valveNumber: parseInt(state.selectedValve), historico: firebase.firestore.FieldValue.arrayUnion(rec), sonda_status: status }, { merge: true }); showToast("Sonda Atualizada!", "success"); state.sondaForm.obs=''; state.step = 'line'; render(false); }
        function askDel(line, valveOrDocId, id) { showPasswordPrompt(async () => { const docRef = db.collection('lines').doc(line).collection('valves').doc(String(valveOrDocId)); const snap = await docRef.get(); if(snap.exists) { const data = snap.data(); const newHist = data.historico.filter(r => String(r.id) !== String(id)); await docRef.update({ historico: newHist }); showToast("Excluído!", "success"); render(false); } else { showToast("Erro: Doc não encontrado", "error"); } }); }
        function askDelOp(id) { showPasswordPrompt(async () => { await db.collection('oportunidades').doc(id).delete(); showToast("Excluído!", "success"); render(false); }); }
        function loadGridStatus() {
            const d=globalDB[state.selectedLine]||{};
            const ops=opportunitiesDB[state.selectedLine]||[];
            const opValves = new Set(ops.map(o => String(o.valvula)));
            const cnt = LINE_CONFIGS[state.selectedLine].valveCount;
            if(!cnt) return;
            const now = Date.now();
            const MS_30 = 30*24*60*60*1000;
            const MS_90 = 90*24*60*60*1000;
            for(let i=1;i<=cnt;i++){
                const btn = document.getElementById(`vbtn-${i}`);
                if(!btn) continue;
                btn.classList.remove('valve-jumpeada','valve-op-ativa','valve-op-critica','valve-corretiva-recente','valve-preventiva-ok');
                const vd = d[i]||{};
                const hist = vd.historico||[];
                if(vd.sonda_status==='jumpeada'){ btn.classList.add('valve-jumpeada'); continue; }
                if(opValves.has(String(i))){ btn.classList.add('valve-op-critica'); continue; }
                let hasCorretiva30=false, hasPreventiva90=false;
                hist.forEach(h=>{
                    const age = now - new Date(h.timestamp).getTime();
                    if(h.type==='corretiva' && age < MS_30) hasCorretiva30=true;
                    if(h.type==='preventiva' && age < MS_90) hasPreventiva90=true;
                });
                if(hasCorretiva30){ btn.classList.add('valve-corretiva-recente'); }
                else if(hasPreventiva90){ btn.classList.add('valve-preventiva-ok'); }
            }
        }

        function openLinePicker() { showOptionPicker("Filtrar Local",[{label:'Todas',value:'all'},{label:'512',value:'512'},{label:'513',value:'513'},{label:'514',value:'514'},{label:'Placas (Estoque/Lab)',value:'Placas'}], (v)=>{ state.filters.line=v; document.getElementById('hl-txt').innerText=v; loadHistory(); }); }
        function openTypePicker() { showOptionPicker("Filtrar Tipo",[{label:'Todos',value:'all'},{label:'Preventiva',value:'preventiva'},{label:'Corretiva',value:'corretiva'},{label:'Inspeção',value:'inspecao'},{label:'Sonda',value:'sonda'},{label:'Falhas Enchedora',value:'falha_geral'},{label:'Movimentação de Placas',value:'placa_move'},{label:'Oportunidades Pendentes',value:'ops_abertas'}], (v)=>{ state.filters.historyType=v; document.getElementById('ht-txt').innerText=v; loadHistory(); }); }

        function renderHistoryView(c) { c.innerHTML = `<div class="space-y-4 animate-pop-in"><div class="card-industrial p-4 space-y-3"><div class="grid grid-cols-2 gap-3"><div><label class="label-industrial">Local</label><button onclick="openLinePicker()" class="w-full text-left p-2 rounded bg-secondary border border-gray-700 flex justify-between"><span id="hl-txt" class="text-sm font-bold">Todas</span><i data-lucide="chevron-down" class="w-4 h-4"></i></button></div><div><label class="label-industrial">Tipo</label><button onclick="openTypePicker()" class="w-full text-left p-2 rounded bg-secondary border border-gray-700 flex justify-between"><span id="ht-txt" class="text-sm font-bold">Todos</span><i data-lucide="chevron-down" class="w-4 h-4"></i></button></div></div><div class="grid grid-cols-2 gap-3"><div><label class="label-industrial">Válvula / Placa</label><input type="text" placeholder="Todas" class="input-industrial" oninput="state.filters.valve=this.value; loadHistory()"></div></div><div class="grid grid-cols-2 gap-3"><div><label class="label-industrial">Início</label><input type="date" id="d-ini" class="input-industrial text-xs py-2"></div><div><label class="label-industrial">Fim</label><input type="date" id="d-fim" class="input-industrial text-xs py-2"></div></div><div class="grid grid-cols-2 gap-3 mt-4"><button onclick="exportData('excel')" class="btn-industrial bg-green-700 text-white text-xs py-3 flex justify-center gap-2"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Excel</button><button onclick="exportData('pdf')" class="btn-industrial bg-red-700 text-white text-xs py-3 flex justify-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> PDF</button></div></div><div id="h-list" class="space-y-2 pb-24 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div></div>`; loadHistory(); }

        function getFilteredData() {
            const {line, valve, historyType} = state.filters;
            let res =[];
            const lines = (line === 'all') ? Object.keys(LINE_CONFIGS) : [line];
            const searchValve = valve ? String(valve).toUpperCase() : null;

            if (historyType !== 'ops_abertas') {
                lines.forEach(l => {
                    if (l === 'Placas') {
                        Object.values(placasDB).forEach(p => {
                            if (searchValve && String(p.nome).toUpperCase() !== searchValve) return;
                            if (p.historico) {
                                p.historico.forEach(h => {
                                    if (historyType !== 'all' && historyType !== 'placa_move') return;
                                    res.push({ id: h.id, timestamp: h.timestamp, line: 'Placas', valve: p.nome, type: 'placa_move', subset: 'Estoque', description: `Moveu ${h.qtd} un. de ${h.de.toUpperCase()} para ${h.para.toUpperCase()} ${h.obs ? '- '+h.obs : ''} (Exec: ${h.executante})`, isPlaca: true });
                                });
                            }
                        });
                    } else {
                        const ld = globalDB[l] || {};
                        Object.values(ld).forEach(v => {
                            if (searchValve && String(v.valveNumber).toUpperCase() !== searchValve) return;
                            if (v.historico) {
                                v.historico.forEach(h => {
                                    if (historyType !== 'all') {
                                        if (historyType === 'sonda' && h.subset !== 'SONDA') return;
                                        if (historyType === 'falha_geral' && h.type !== 'falha_geral') return;
                                        if (historyType !== 'sonda' && historyType !== 'falha_geral' && h.type !== historyType) return;
                                    }
                                    res.push({...h, line: l, valve: v.valveNumber, docId: v.docId});
                                });
                            }
                        });
                    }
                });
            }

            if (historyType === 'ops_abertas') {
                lines.forEach(l => {
                    const ops = opportunitiesDB[l] ||[];
                    ops.forEach(o => {
                        if (searchValve && String(o.valvula).toUpperCase() !== searchValve) return;
                        res.push({ id: o.id, timestamp: new Date().toISOString(), line: l, valve: o.valvula, type: 'oportunidade', subset: o.subset || 'Geral', description: `PENDENTE: ${o.texto} - Solicitante: ${o.nome}`, isOp: true });
                    });
                });
            }

            res.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            return res;
        }

        function loadHistory() {
            const el = document.getElementById('h-list');
            const res = getFilteredData();

            el.innerHTML = res.map(r => {
                let btnDel = '';
                if (r.isOp) btnDel = `<button onclick="askDelOp('${r.id}')" class="text-red-500 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
                else if (!r.isPlaca) btnDel = `<button onclick="askDel('${r.line}','${r.docId}','${r.id}')" class="text-red-500 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;

                if(r.isOp) return `<div class="card-industrial p-4 border border-gray-400/40 relative bg-white/3"><div class="absolute top-0 right-0 bg-primary text-white text-[10px] px-2 rounded-bl">PENDENTE</div><div class="flex justify-between mb-2"><span class="font-bold text-gray-300 font-mono">${r.line==='Placas'?'MOD':'L'+r.line}/${r.valve}</span>${btnDel}</div><div class="flex gap-2"><i data-lucide="alert-circle" class="w-4 h-4 text-gray-300"></i><p class="text-sm text-gray-300">${r.description}</p></div></div>`;

                const d = new Date(r.timestamp);
                const isSonda = r.isSonda || r.subset === 'SONDA';
                const isFalhaGeral = r.type === 'falha_geral';

                let icon = 'wrench'; let color = 'text-primary'; let cardStyle = "card-industrial p-4 border relative border-gray-700";
                if(r.isCritical) { icon = 'flame'; color = 'text-red-500'; cardStyle = "card-industrial p-4 border relative border-red-500/80"; }
                else if(isSonda) { icon = 'zap'; color = 'text-yellow-500'; cardStyle = "card-industrial p-4 border relative border-yellow-500 bg-yellow-500/10"; }
                else if(isFalhaGeral) { icon = 'alert-triangle'; color = 'text-red-500'; cardStyle = "card-industrial p-4 border relative border-red-500 bg-red-500/10"; }
                else if(r.isPlaca) { icon = 'cpu'; color = 'text-gray-300'; cardStyle = "card-industrial p-4 border relative border-gray-400/40 bg-gray-800/10"; }

                const valveDisplay = (r.valve === 0 || r.valve === 'GERAL') ? 'GERAL' : `${r.line==='Placas'?'':'V'}${r.valve}`;
                const titleDisp = r.line === 'Placas' ? `<span class="text-gray-300">Placas/${valveDisplay}</span>` : `<span class="text-primary">L${r.line}/${valveDisplay}</span>`;

                return `<div class="${cardStyle}">${r.isCritical ? '<div class="absolute top-0 right-0 bg-red-600 text-white text-[10px] px-2 rounded-bl">CRÍTICA</div>' : ''}<div class="flex justify-between mb-2"><span class="font-bold font-mono">${titleDisp}</span><div class="flex items-center gap-2"><span class="text-xs text-gray-400">${d.toLocaleDateString('pt-BR')} ${d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>${btnDel}</div></div><div class="flex gap-2"><i data-lucide="${icon}" class="w-4 h-4 ${color}"></i><p class="text-sm text-gray-300"><strong class="text-gray-400">${r.subset}:</strong> ${r.description}</p></div></div>`;
            }).join('');
            lucide.createIcons();
        }

        async function exportData(fmt) {
            const start = document.getElementById('d-ini').value;
            const end = document.getElementById('d-fim').value;

            let data =[];
            const screenData = getFilteredData();

            screenData.forEach(r => {
                const dStr = r.timestamp.split('T')[0];
                if ((!start || dStr >= start) && (!end || dStr <= end)) {
                    let tipoNome = r.type;
                    if (r.type === 'sonda_event') tipoNome = 'Sonda (Jumper)';
                    if (r.subset === 'SONDA' && r.type === 'corretiva') tipoNome = 'Sonda (Normalizado)';
                    if (r.isPlaca) tipoNome = 'Movimentação Placa';
                    if (r.type === 'falha_geral') tipoNome = 'Falha Enchedora';
                    if (r.isOp) tipoNome = 'Oportunidade (Pendente)';

                    data.push({
                        Data: new Date(r.timestamp).toLocaleDateString() + ' ' + new Date(r.timestamp).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
                        Local: r.line === 'Placas' ? 'Placas' : 'L' + r.line,
                        'Válvula/Placa': (r.valve === 0 || r.valve === 'GERAL') ? 'GERAL' : r.valve,
                        Tipo: tipoNome.toUpperCase(),
                        Item: r.subset || 'Geral',
                        Desc: r.description
                    });
                }
            });

            const snap = await db.collection('historico_oportunidades').get();
            snap.forEach(d => {
                const r = d.data();
                if((state.filters.line === 'all' || r.linha === state.filters.line)) {
                    const dt = r.dataConclusao.split('T')[0];
                    if((!start || dt >= start) && (!end || dt <= end)) {
                        data.push({
                            Data: new Date(r.dataConclusao).toLocaleDateString() + ' ' + new Date(r.dataConclusao).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
                            Local: r.linha,
                            'Válvula/Placa': '-',
                            Tipo: 'MELHORIA (OP. CONCLUÍDA)',
                            Item: '-',
                            Desc: `Solução: ${r.solucao} (Exec: ${r.executante})`
                        });
                    }
                }
            });

            if(!data.length) { showToast("Sem dados para exportar.", "error"); return; }

            if(fmt === 'excel') {
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), "Relatório");
                XLSX.writeFile(wb, "Relatorio.xlsx");
            } else {
                const doc = new window.jspdf.jsPDF();
                doc.setFillColor(15,23,42);
                doc.rect(0,0,210,297,'F');
                doc.setTextColor(255);
                doc.text("CERVEJARIA JACAREÍ",105,20,null,null,"center");
                doc.autoTable({startY:40, head:[Object.keys(data[0])], body:data.map(Object.values)});
                doc.save("Relatorio.pdf");
            }
        }


        // ── Audio Transcription ──────────────────────────────────────
        let mediaRecognition = null;
        let isRecording = false;
        function toggleMic() {
            if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
                showToast('Navegador sem suporte a áudio. Use Chrome.','error'); return;
            }
            if(isRecording){
                mediaRecognition?.stop(); isRecording=false;
                const btn=document.getElementById('mic-btn');
                const lbl=document.getElementById('mic-label');
                const st=document.getElementById('mic-status');
                if(btn){ const ic=btn.querySelector('i'); if(ic){ ic.setAttribute('data-lucide','mic'); lucide.createIcons(); } }
                if(lbl) lbl.textContent='Áudio';
                if(st) st.classList.add('hidden');
                return;
            }
            const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
            mediaRecognition=new SR();
            mediaRecognition.lang='pt-BR';
            mediaRecognition.continuous=true;
            mediaRecognition.interimResults=true;
            let baseText=state.form.description||'';
            mediaRecognition.onresult=(e)=>{
                let interim='', finalPart=baseText;
                for(let i=e.resultIndex;i<e.results.length;i++){
                    if(e.results[i].isFinal){ finalPart+=(finalPart?' ':'')+e.results[i][0].transcript; baseText=finalPart; }
                    else interim+=e.results[i][0].transcript;
                }
                state.form.description=finalPart;
                const ta=document.getElementById('desc');
                if(ta) ta.value=finalPart+(interim?' '+interim:'');
            };
            mediaRecognition.onerror=()=>{ isRecording=false; showToast('Erro no microfone','error'); };
            mediaRecognition.onend=()=>{ if(isRecording) mediaRecognition.start(); };
            mediaRecognition.start();
            isRecording=true;
            const btn=document.getElementById('mic-btn');
            const lbl=document.getElementById('mic-label');
            const st=document.getElementById('mic-status');
            if(btn){ const ic=btn.querySelector('i'); if(ic){ ic.setAttribute('data-lucide','mic-off'); lucide.createIcons(); } }
            if(lbl) lbl.textContent='Parar';
            if(st) st.classList.remove('hidden');
        }

        // ── Photo Upload (Canvas compress → base64 → Firestore) ──────
        async function handlePhotoUpload(event){
            const file=event.target.files[0]; if(!file) return;
            const MAX=800, Q=0.78;
            const url=URL.createObjectURL(file);
            const img=new Image();
            img.onload=()=>{
                URL.revokeObjectURL(url);
                let w=img.width, h=img.height;
                if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} }
                else{ if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
                const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
                cv.getContext('2d').drawImage(img,0,0,w,h);
                const b64=cv.toDataURL('image/jpeg',Q);
                if(!state.form.photos) state.form.photos=[];
                if(state.form.photos.length>=3){ showToast('Máximo 3 fotos por registro','error'); return; }
                state.form.photos.push(b64);
                render(false);
            };
            img.src=url;
        }
        function removePhoto(idx){ state.form.photos.splice(idx,1); render(false); }
        function addTag(tag){
            const ta=document.getElementById('desc');
            const cur=state.form.description;
            state.form.description=cur?cur+', '+tag:tag;
            if(ta) ta.value=state.form.description;
        }

        // Enter confirma modal quando um input está focado
        document.addEventListener('keydown', function(e) {
            if (e.key !== 'Enter') return;
            const modal = document.getElementById('custom-modal');
            if (modal.classList.contains('hidden')) return;
            const focused = document.activeElement;
            const content = document.getElementById('modal-content');
            if (content && content.contains(focused) && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA')) {
                // Procura o botão de confirmação principal (último btn-industrial ou bg-primary)
                const btns = content.querySelectorAll('button.btn-industrial, button.bg-primary');
                if (btns.length > 0) { e.preventDefault(); btns[btns.length - 1].click(); }
            }
        });

        render();
    
// ── Long-press: abre historico da valvula ──
var _lpTimer = null; window._lpFired = false;
function startLongPress(v) {
  window._lpFired = false;
  _lpTimer = setTimeout(function(){ window._lpFired = true; showValveHistory(v); }, 600);
}
function cancelLongPress() { if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; } }
function closeHistoryModal() { document.getElementById("history-modal").style.display = "none"; }
function showValveHistory(vNum) {
  var line = state.selectedLine;
  var vd = globalDB[line] && globalDB[line][String(vNum)];
  var hist = vd ? (vd.historico || []) : [];
  var sorted = hist.slice().sort(function(a,b){ return new Date(b.timestamp) - new Date(a.timestamp); });
  var lbl = { corretiva:"Corretiva", preventiva:"Preventiva", sonda_event:"Sonda", falha_geral:"Falha", inspecao:"Inspeção" };
  var h = "<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">" +
    "<span style=\"font-weight:700;font-size:1.1rem;color:var(--color-text-primary,#e2e8f0)\">Válvula " + vNum + " — L" + line + "</span>" +
    "<button onclick=\"closeHistoryModal()\" style=\"font-size:1.6rem;line-height:1;background:none;border:none;cursor:pointer;color:var(--color-text-muted,#94a3b8)\">×</button></div>";
  if (!sorted.length) {
    h += "<p style=\"text-align:center;padding:28px 0;color:var(--color-text-muted,#94a3b8)\">Nenhum registro encontrado.</p>";
  } else {
    sorted.forEach(function(e) {
      var dt = new Date(e.timestamp);
      var ds = dt.toLocaleDateString("pt-BR") + " " + dt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
      var clr = e.status === "ok" ? "#4ade80" : "#facc15";
      var stTxt = e.status === "ok" ? "✅ Concluído" : "⏳ Pendente";
      h += "<div style=\"border:1px solid var(--color-border,#2d3a5a);border-radius:12px;padding:12px;margin-bottom:8px\">" +
        "<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:4px\">" +
        "<span style=\"font-size:.75rem;font-weight:600;color:var(--color-primary,#60a5fa)\">" + (lbl[e.type] || e.type) + "</span>" +
        "<span style=\"font-size:.72rem;color:var(--color-text-muted,#94a3b8)\">" + ds + "</span></div>" +
        "<div style=\"font-size:.875rem;font-weight:600;color:var(--color-text-primary,#e2e8f0);margin-bottom:2px\">" + (e.subset || "Geral") + "</div>" +
        "<div style=\"font-size:.75rem;color:var(--color-text-muted,#94a3b8);line-height:1.4\">" + (e.description || "") + "</div>" +
        (e.status ? "<div style=\"font-size:.72rem;margin-top:5px;color:" + clr + "\">" + stTxt + "</div>" : "") +
        "</div>";
    });
  }
  document.getElementById("history-content").innerHTML = h;
  var m = document.getElementById("history-modal");
  m.style.display = "flex"; m.style.flexDirection = "column";
  history.pushState({valveModal:true}, "");
}

window.addEventListener("popstate", function(e) {
  var m = document.getElementById("history-modal");
  if (m && m.style.display !== "none") { m.style.display = "none"; }
});
</script>
<div id="history-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.75);flex-direction:column"><div style="flex:1" onclick="closeHistoryModal()"></div><div id="history-content" style="background:var(--color-surface,#1a2035);border-top:1px solid var(--color-border,#2d3a5a);border-radius:16px 16px 0 0;padding:16px;max-height:70vh;overflow-y:auto"></div></div>
</body>
